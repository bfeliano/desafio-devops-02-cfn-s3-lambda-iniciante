AWSTemplateFormatVersion: 2010-09-09
Description: 'Desafio DevOps 02 — CloudFormation Iniciante: Fluxo S3 -> Lambda que processa arquivos enviados ao bucket.'


Resources:
  ###############################################################
  # S3 Bucket
  ###############################################################
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "desafio-devops-02-${AWS::AccountId}-${AWS::Region}"
      NotificationConfiguration:
        LambdaConfigurations:
          - Function: !GetAtt Lambda.Arn
            Event: 's3:ObjectCreated:*'
    DependsOn: AllowS3InvokeLambda

  ###############################################################
  # IAM Role para Lambda
  ###############################################################
  LambdaRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub "desafio-devops-02-role-${AWS::AccountId}-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ###############################################################
  # Lambda Function
  ###############################################################
  Lambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "desafio-devops-02-lambda-${AWS::AccountId}-${AWS::Region}"
      Runtime: python3.13
      Role: !GetAtt LambdaRole.Arn
      Handler: index.lambda_handler
      Code:
        ZipFile: |
          import json
          import urllib.parse
          import boto3

          s3 = boto3.client('s3')

          def lambda_handler(event, context):
              print("Evento recebido:")
              print(json.dumps(event))

              # Pega o bucket e o arquivo enviado
              record = event['Records'][0]
              bucket = record['s3']['bucket']['name']
              key = urllib.parse.unquote_plus(record['s3']['object']['key'])

              print(f"Arquivo recebido: {key} no bucket {bucket}")

              return {
                  'statusCode': 200,
                  'body': json.dumps(f"Processado com sucesso: {key}")
              }
      Description: "Lambda utilizada para processar os arquivos recebidos no bucket S3."
      TracingConfig:
        Mode: Active

  ###############################################################
  # Permissão S3 → Lambda
  ###############################################################
  AllowS3InvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Lambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com

###############################################################
# Outputs
###############################################################
Outputs:
  BucketName:
    Description: "Nome do bucket que recebe os arquivos"
    Value: !Ref S3Bucket

  LambdaArn:
    Description: "ARN da Lambda acionada pelos uploads"
    Value: !GetAtt Lambda.Arn